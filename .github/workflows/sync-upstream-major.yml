name: Sync Latest Upstream Major Tag

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-latest-upstream-major
  cancel-in-progress: false

jobs:
  sync-major-tag:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_VERSION_FILE: OPENCLAW_UPSTREAM_VERSION
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate RELEASE_PUSH_TOKEN
        shell: bash
        env:
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_PUSH_TOKEN" ]]; then
            echo "RELEASE_PUSH_TOKEN is required" >&2
            exit 1
          fi

      - name: Resolve latest stable upstream major tag
        id: upstream
        shell: bash
        run: |
          set -euo pipefail

          latest_major="$(git ls-remote --tags --refs https://github.com/openclaw/openclaw.git 'v*' \
            | sed -n 's|.*refs/tags/\(v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)$|\1|p' \
            | sort -V \
            | tail -n 1)"

          if [[ -z "$latest_major" ]]; then
            echo "Failed to resolve latest stable upstream major tag" >&2
            exit 1
          fi

          echo "latest_major=$latest_major" >>"$GITHUB_OUTPUT"

      - name: Sync upstream version file and tag
        id: sync
        shell: bash
        env:
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
          LATEST_MAJOR: ${{ steps.upstream.outputs.latest_major }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote set-url origin "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --tags origin

          current_major=""
          if [[ -f "${UPSTREAM_VERSION_FILE}" ]]; then
            current_major="$(cat "${UPSTREAM_VERSION_FILE}")"
          fi

          version_updated="false"
          if [[ "${current_major}" != "${LATEST_MAJOR}" ]]; then
            printf '%s\n' "${LATEST_MAJOR}" > "${UPSTREAM_VERSION_FILE}"
            git add "${UPSTREAM_VERSION_FILE}"
            git commit -s -m "chore: sync upstream version to ${LATEST_MAJOR}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
            version_updated="true"
            echo "Updated ${UPSTREAM_VERSION_FILE}: ${current_major:-<empty>} -> ${LATEST_MAJOR}"
          else
            echo "${UPSTREAM_VERSION_FILE} already at ${LATEST_MAJOR}"
          fi

          created="false"
          if git ls-remote --tags --exit-code origin "refs/tags/${LATEST_MAJOR}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${LATEST_MAJOR}"
          else
            git tag "${LATEST_MAJOR}"
            git push origin "${LATEST_MAJOR}"
            created="true"
            echo "Created and pushed tag: ${LATEST_MAJOR}"
          fi

          echo "version_updated=${version_updated}" >>"$GITHUB_OUTPUT"
          echo "created=${created}" >>"$GITHUB_OUTPUT"
          echo "tag=${LATEST_MAJOR}" >>"$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        env:
          VERSION_UPDATED: ${{ steps.sync.outputs.version_updated }}
          CREATED: ${{ steps.sync.outputs.created }}
          TAG_NAME: ${{ steps.sync.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$VERSION_UPDATED" == "true" && "$CREATED" == "true" ]]; then
            echo "Updated ${UPSTREAM_VERSION_FILE} and created new tag ${TAG_NAME}."
          elif [[ "$VERSION_UPDATED" == "true" ]]; then
            echo "Updated ${UPSTREAM_VERSION_FILE}; tag ${TAG_NAME} already existed."
          elif [[ "$CREATED" == "true" ]]; then
            echo "Version already current; created missing tag ${TAG_NAME}."
          else
            echo "No changes required. ${UPSTREAM_VERSION_FILE} and tag ${TAG_NAME} are already current."
          fi
