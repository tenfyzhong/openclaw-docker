name: Bats Unit Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats tests
        shell: bash
        run: |
          set -euo pipefail
          bats tests/create-tag.bats
