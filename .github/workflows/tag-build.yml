name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse release tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Unsupported tag format: $tag" >&2
            exit 1
          fi

          image_tag="${tag#v}"
          openclaw_major="$(sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+)(\.[0-9]+)?$/\1/' <<<"$tag")"

          echo "image_tag=$image_tag" >>"$GITHUB_OUTPUT"
          echo "openclaw_major=$openclaw_major" >>"$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_VERSION=${{ steps.vars.outputs.openclaw_major }}
          tags: |
            tenfyzhong/openclaw:${{ steps.vars.outputs.image_tag }}
            tenfyzhong/openclaw:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Docker image

            Published image tags:

            - `tenfyzhong/openclaw:${{ steps.vars.outputs.image_tag }}`
            - `tenfyzhong/openclaw:latest`

            Pull image:

            ```bash
            docker pull tenfyzhong/openclaw:${{ steps.vars.outputs.image_tag }}
            ```

            Run with docker compose:

            ```bash
            OPENCLAW_VERSION=${{ steps.vars.outputs.image_tag }} docker compose up -d
            ```

            Run container directly:

            ```bash
            docker run --rm -it \
              -p 18789:18789 -p 18790:18790 \
              -e OPENCLAW_GATEWAY_BIND=lan \
              -v "$PWD/.docker/openclaw/config:/home/node/.openclaw" \
              -v "$PWD/.docker/openclaw/workspace:/home/node/.openclaw/workspace" \
              tenfyzhong/openclaw:${{ steps.vars.outputs.image_tag }} gateway
            ```
